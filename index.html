<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 标题：必须包含“李若秋” -->
    <title>李若秋</title>

    <!-- 描述：再次出现关键词 -->
    <meta name="description" content="李若秋的图片展示与资料">

    <!-- 告诉搜索引擎可以索引 -->
    <meta name="robots" content="index, follow">

    <!-- Open Graph 标签（社交平台分享时使用） -->
    <meta property="og:title" content="李若秋">
    <meta property="og:description" content="李若秋的图片展示">
    <meta property="og:image" content="https://raw.githubusercontent.com/miaolife/miaolife.github.io/refs/heads/main/u.jpg">
    <meta property="og:url" content="https://your-site.netlify.app">
    <meta property="og:type" content="website">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="李若秋">
    <meta name="twitter:description" content="李若秋的图片展示">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/miaolife/miaolife.github.io/refs/heads/main/u.jpg">

    <!-- 结构化数据：明确告诉搜索引擎这是“人”的页面，并指定代表图片 -->
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "Person",
            "name": "李若秋",
            "image": "https://raw.githubusercontent.com/miaolife/miaolife.github.io/refs/heads/main/u.jpg",
            "url": "https://your-site.netlify.app"
        }
    </script>

    <style>
        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
            background: #fff;
            color: #333;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.3rem;
        }
        .main-image {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            margin: 24px 0;
        }
        .caption {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 32px;
        }
    </style>
</head>
<body>

    <!-- 页面可见内容，多次自然地包含“李若秋” -->
    <h1>李若秋</h1>
    <p class="caption">以下是李若秋的图片大赏。</p>

    <img 
        class="main-image"
        src="https://raw.githubusercontent.com/miaolife/miaolife.github.io/refs/heads/main/u.jpg" 
        alt="李若秋"
        title="李若秋"
        width="600" 
        height="auto"
    >

    <p>四班神人李若秋。</p>

</body>
</html>
